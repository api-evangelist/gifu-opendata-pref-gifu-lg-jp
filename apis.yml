aid: gifu-opendata-pref-gifu-lg-jp
name: Gifu Prefecture Open Data
description: >-
  Gifu Prefecture Open Data is a regional government open-data portal for Japan running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 1,881 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
