apis:
  - aid: gifu-opendata-pref-gifu-lg-jp:catalog
    name: Gifu Prefecture Open Data CKAN Action API
    description: >-
      CKAN Action API for Gifu Prefecture Open Data, a consistent JSON-over-HTTP interface over a catalog of 1,881 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://gifu-opendata.pref.gifu.lg.jp/api/3/action/.
    humanURL: https://gifu-opendata.pref.gifu.lg.jp
